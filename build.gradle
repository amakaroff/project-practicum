plugins {
    id 'java'
    id 'com.diffplug.spotless'
}

group = 'ru.tbank.practicum'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

dependencies {

}

test {
    useJUnitPlatform()
}

// ----- Linter -----

spotless {
    java {
        googleJavaFormat()
        removeUnusedImports()
    }
}

